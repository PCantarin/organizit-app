<!DOCTYPE html>

    <link rel="stylesheet" href="../css/home.css">

<body>

    <div class="sistema-layout">

                <button>Patrimônio</button>

        <main id="conteudo-principal">

                <p>O conteúdo inserido aqui ficará perfeitamente centralizado e adaptável.</p>
