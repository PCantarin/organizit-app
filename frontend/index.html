<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/login.css">
    <title>Login</title>
</head>

<body>

    <div class="login-container">

        <div class="login-img">
            <h1>Bem-Vindo!</h1>
        </div>

        <div class="login-form">
            <h2>Login</h2>

            <div class="input-group">
                <label>Email</label>
                <input type="email">
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input type="password">
            </div>

            <button>Entrar</button>
        </div>

    </div>

</body>

</html>
