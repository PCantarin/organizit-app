<h1>Produtos</h1>

<mat-divider class="divider" />
<br />

<table mat-table [dataSource]="produtos()">
    <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>ID</th>
        <td mat-cell *matCellDef="let produto">{{ produto.id }}</td>
    </ng-container>

    <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nome</th>
        <td mat-cell *matCellDef="let produto">{{ produto.name }}</td>
    </ng-container>

    <ng-container matColumnDef="assetNumber">
        <th mat-header-cell *matHeaderCellDef>Patrimônio</th>
        <td mat-cell *matCellDef="let produto">{{ produto.assetNumber }}</td>
    </ng-container>

    <ng-container matColumnDef="description">
        <th mat-header-cell *matHeaderCellDef>Descrição</th>
        <td mat-cell *matCellDef="let produto">{{ produto.description }}</td>
    </ng-container>

    <ng-container matColumnDef="dateInsert">
        <th mat-header-cell *matHeaderCellDef>Data de cadastro</th>
        <td mat-cell *matCellDef="let produto">{{ produto.dateInsert }}</td>
    </ng-container>

    <ng-container matColumnDef="quantity">
        <th mat-header-cell *matHeaderCellDef>Quantidade</th>
        <td mat-cell *matCellDef="let produto">{{ produto.quantity }}</td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>
