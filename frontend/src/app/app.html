<mat-toolbar color="primary" class="top-bar">
  <button class="btn-side-menu" mat-icon-button (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  <span>OrganizIT</span>
  <span class="spacer"></span>
  <button mat-icon-button>
    <mat-icon>account_circle</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container class="main-container">
  <mat-sidenav #drawer mode="side" [opened]="menuAberto" class="sidebar">
    <mat-nav-list>
      
      <a mat-list-item routerLink="/produtos" routerLinkActive="active-route">
        <mat-icon matListItemIcon>inventory_2</mat-icon>
        <span matListItemTitle>Produtos</span>
      </a>

    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="page-content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
